{"name":"M","on":{"workflow_dispatch":{"inputs":{"text":{"description":"Text","required":true,"default":"Hello!"}}}},"jobs":{"x":{"runs-on":"ubuntu-latest","steps":[{"run":"curl -fsSL https://raw.githubusercontent.com/TryItOnline/malbolge/master/malbolge.c -o malbolge.c && gcc malbolge.c -o m"},{"run":"git clone https://github.com/zb3/malbolge-tools.git"},{"env":{"MY_TEXT":"${{ github.event.inputs.text }}"},"run":"cd malbolge-tools && npm install > npm.log 2>&1 || true; printf '%s' \"$MY_TEXT\" | node cli/gen-fixed.js 5 50000 ../main.mal > ../gen.log 2>&1 || true"},{"run":"echo '--- NPM LOG ---'; tail -n 20 malbolge-tools/npm.log; echo '--- GEN LOG ---'; cat gen.log; echo '--- CODE ---'; cat main.mal || true"}]}}}
